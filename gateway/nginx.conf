worker_processes 1;

events { worker_connections 1024; }

http {
    sendfile on;
    client_max_body_size 100M;

    upstream user_service {
        server user-service:8002;
    }

    upstream course_service {
        server course-service:8001;
    }

    upstream analytics_service {
        server analytics-service:8003;
    }

    upstream ai_tutor_service {
        server ai-tutor-service:8004;
    }

    upstream frontend {
        server learning-portal:3000;
    }

    server {
        listen 8000;

        location /api/v1/users {
            proxy_pass http://user_service/api/v1/users;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/tutor {
            proxy_pass http://ai_tutor_service/api/v1/tutor;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 600;
            proxy_connect_timeout 600;
            proxy_send_timeout 600;
        }

        location /api/v1/ {
            proxy_pass http://course_service/api/v1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /metrics {
            proxy_pass http://analytics_service/metrics;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /events {
            proxy_pass http://analytics_service/events;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
