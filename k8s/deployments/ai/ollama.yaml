apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: elearning
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "1800Mi"
              cpu: "1500m"
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
      volumes:
        - name: ollama-data
          emptyDir: {}

---
apiVersion: batch/v1
kind: Job
metadata:
  name: init-ollama
  namespace: elearning
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-ollama
          image: busybox
          command: ['sh', '-c', 'until nc -z ollama 11434; do echo waiting; sleep 5; done']
      containers:
        - name: pull-llama3
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              curl -X POST http://ollama:11434/api/pull \
                -H "Content-Type: application/json" \
                -d '{"name": "llama3"}' \
                --max-time 600