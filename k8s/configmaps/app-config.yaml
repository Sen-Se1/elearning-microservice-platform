apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: elearning
data:
  APP_NAME: "Learning Portal"
  APP_VERSION: "1.0.0"
  LOG_LEVEL: "INFO"
  NODE_ENV: "production"
  DEBUG: "false"
  COURSE_BACKEND_PORT: "8001"
  USER_BACKEND_PORT: "8002"
  ANALYTICS_BACKEND_PORT: "8003"
  AI_TUTOR_BACKEND_PORT: "8004"
  COURSE_SERVICE_URL: "http://course-service:8001"
