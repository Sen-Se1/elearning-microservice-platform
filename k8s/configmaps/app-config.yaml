  NEXT_PUBLIC_COURSE_SERVICE_URL: "http://192.168.66.10/api/v1"
  NEXT_PUBLIC_ANALYTICS_SERVICE_URL: "http://192.168.66.10/metrics"
  NEXT_PUBLIC_AI_TUTOR_SERVICE_URL: "http://192.168.66.10/api/v1/tutor"
