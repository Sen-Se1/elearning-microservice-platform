# ClusterIP — internal access for course-service
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: elearning
spec:
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
  type: ClusterIP

---
# NodePort — MinIO Console accessible at http://192.168.66.10:30901
apiVersion: v1
kind: Service
metadata:
  name: minio-console
  namespace: elearning
spec:
  selector:
    app: minio
  ports:
    - port: 9001
      targetPort: 9001
      nodePort: 30901
  type: NodePort